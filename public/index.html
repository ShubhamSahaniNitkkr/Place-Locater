<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#007bff" />
    <meta name="description" content="Pin, search, and share locations on an interactive map — like WhatsApp live location." />
    <link rel="icon" href="./graphics/title.ico" type="image/x-icon" />

    <link rel="stylesheet" href="./css/index.css" />

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <title>Place Locater | Shubham Sunny</title>
  </head>
  <body>
    <div class="containner-fluid mt-5 pt-3">
      <nav
        class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm mb-5 bg-white rounded pl-4 pr-4"
      >
        <a class="navbar-brand" href="#">
          <i class="fas fa-thumbtack text-primary"></i> Place Locater
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item active">
              <a class="nav-link" href="#">
                <i class="fas fa-home text-primary"></i> Home
                <span class="sr-only">(current)</span>
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <div id="shared-location-banner" class="shared-banner d-none">
        <i class="fas fa-map-marker-alt"></i>
        <span id="shared-banner-text">Someone shared a location with you</span>
        <a
          id="open-maps-link"
          href="#"
          target="_blank"
          rel="noopener"
          class="btn btn-sm btn-outline-success"
        >
          Open in Maps
        </a>
      </div>

      <div id="map"></div>
      <p class="map-hint">
        <i class="fas fa-hand-pointer"></i> Tap the map to drop a pin, or search an address below
      </p>

      <div class="col-md-12 d-flex justify-content-center mt-2">
        <div class="card shadow p-3 mb-5 bg-white rounded" style="width: 50vw;">
          <div class="card-body">
            <form id="place-form">
              <div class="form-group autocomplete-wrap">
                <i class="fas fa-map-marker-alt text-primary"></i>
                &nbsp;<label for="place-address">Address</label>
                <input
                  type="text"
                  class="form-control"
                  id="place-address"
                  placeholder="Search address — autocomplete suggestions appear as you type"
                  autocomplete="off"
                  required
                />
                <div id="address-suggestions" role="listbox"></div>
              </div>

              <div class="form-group">
                <label class="d-block text-muted mb-1">Selected coordinates</label>
                <div id="coords-display" class="coords-display"></div>
              </div>

              <div class="form-group">
                <i class="fas fa-store text-primary"></i>
                &nbsp;<label for="place-id">Place Id</label>
                <input
                  type="text"
                  class="form-control"
                  id="place-id"
                  placeholder="Unique id (e.g. home, office, cafe-04)"
                  required
                />
              </div>

              <div class="action-row mb-3">
                <button type="button" id="my-location-btn" class="btn btn-outline-primary">
                  <i class="fas fa-crosshairs"></i> Use my location
                </button>
                <button type="button" id="share-location-btn" class="btn btn-outline-success">
                  <i class="fas fa-share-alt"></i> Share location
                </button>
              </div>

              <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus text-white"></i> &nbsp; Add New Place
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="app-toast" role="status" aria-live="polite"></div>

    <script src="js/geocoding.js"></script>
    <script src="js/map.js"></script>
    <script src="js/add.js"></script>

    <script
      src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
